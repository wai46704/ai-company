<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="5">
<title>🗝️ Nオフィス執務室</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% -10%, #241b4d 0%, #140f2e 55%, #0b081c 100%);
    font-family: "Meiryo", "Yu Gothic", "Hiragino Sans", sans-serif;
    color: #e8e4ff;
    overflow-x: hidden;
  }

  header { text-align: center; padding: 18px 8px 8px; }
  h1 {
    font-size: 28px;
    letter-spacing: 5px;
    color: #ffe9a8;
    text-shadow: 0 0 14px rgba(255, 214, 110, 0.5), 0 2px 0 #4a3300;
  }
  h1 .key { display: inline-block; animation: keyswing 4s ease-in-out infinite; }
  @keyframes keyswing {
    0%, 100% { transform: rotate(-10deg); }
    50%      { transform: rotate(10deg); }
  }
  #office-message { margin-top: 8px; font-size: 15px; color: #cfd0ff; }
  #office-updated { margin-top: 4px; font-size: 12px; color: #8d8bc2; }

  /* 全員完了バナー */
  #banner {
    display: none;
    margin: 10px auto 0;
    width: fit-content;
    padding: 8px 26px;
    border: 2px solid #ffd76a;
    border-radius: 10px;
    background: linear-gradient(180deg, #3a2c00, #211800);
    color: #ffe9a8;
    font-size: 18px;
    letter-spacing: 3px;
    box-shadow: 0 0 18px rgba(255, 214, 110, 0.45);
    animation: bannerpulse 1.4s ease-in-out infinite;
  }
  @keyframes bannerpulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 12px rgba(255,214,110,.35); }
    50%      { transform: scale(1.04); box-shadow: 0 0 26px rgba(255,214,110,.7); }
  }

  /* ステージ（ドット絵の部屋） */
  #fit { display: flex; justify-content: center; margin-top: 12px; }
  #stage {
    position: relative;
    width: 1280px;
    height: 848px;
    flex: 0 0 auto;
    transform-origin: top center;
  }
  #cv {
    width: 1280px;
    height: 848px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 4px solid #4a3f78;
    border-radius: 6px;
    box-shadow: 0 0 0 4px #17123a, 0 14px 40px rgba(0,0,0,.6);
    display: block;
  }

  /* 壁掛けデジタル時計（DOM・canvas上に重ねる） */
  #clock {
    position: absolute;
    width: 176px;
    text-align: center;
    font-family: "Consolas", "Courier New", monospace;
    font-size: 24px;
    line-height: 56px;
    letter-spacing: 4px;
    color: #7dffb0;
    text-shadow: 0 0 8px rgba(90, 255, 160, .8);
    pointer-events: none;
  }

  /* 状態バッジ */
  .badge { position: absolute; font-size: 26px; pointer-events: none; }
  .badge.zzz   { animation: floatz 2.6s ease-in-out infinite; opacity: .85; }
  .badge.warn  { animation: blinkw 0.8s steps(2) infinite; }
  .badge.check { animation: popin 0.5s ease-out; filter: drop-shadow(0 0 6px rgba(120,255,160,.8)); }
  @keyframes floatz {
    0%, 100% { transform: translateY(0); opacity: .55; }
    50%      { transform: translateY(-8px); opacity: 1; }
  }
  @keyframes blinkw { 0% { opacity: 1; } 50% { opacity: .15; } 100% { opacity: 1; } }
  @keyframes popin  { 0% { transform: scale(0); } 70% { transform: scale(1.3); } 100% { transform: scale(1); } }

  /* 名札 */
  .plate {
    position: absolute;
    width: 336px;
    text-align: center;
    pointer-events: none;
  }
  .plate .nm {
    display: inline-block;
    padding: 3px 14px;
    background: linear-gradient(180deg, #524683, #37305e);
    border: 2px solid #6d5fa8;
    border-radius: 8px;
    font-size: 16px;
    color: #f2eeff;
    letter-spacing: 1px;
    box-shadow: 0 3px 0 #201a40;
  }
  .plate.done .nm { border-color: #ffd76a; background: linear-gradient(180deg, #6b5518, #43350c); color: #ffe9a8; }
  .plate.error .nm { border-color: #ff7a7a; background: linear-gradient(180deg, #6b2020, #401010); }
  .plate .tk {
    margin-top: 4px;
    font-size: 12px;
    color: #b9b4e6;
    background: rgba(15, 12, 38, .78);
    border-radius: 6px;
    padding: 2px 8px;
    display: inline-block;
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
</style>

  (function () {
    // 窓内の星（固定位置・またたきはtickで変化）
    var sx = [98, 112, 126, 141, 155, 170, 186, 199, 214, 224, 105, 133, 163, 191, 219, 148, 178];
    var sy = [16, 24, 13, 30, 18, 26, 14, 33, 20, 29, 38, 44, 40, 46, 40, 52, 48];
    for (var i = 0; i < sx.length; i++) stars.push({ x: sx[i], y: sy[i], ph: i % 5 });
  })();

  function drawRoom(tick) {
    // 壁と床
    px(0, 0, 320, FLOOR_Y, "#2a2447");
    px(0, FLOOR_Y, 320, 212 - FLOOR_Y, "#463a63");
    px(0, FLOOR_Y, 320, 2, "#2f2548");
    for (var fx = 0; fx < 320; fx += 32) px(fx, FLOOR_Y + 2, 1, 212 - FLOOR_Y, "#3c3156");
    for (var fy = FLOOR_Y + 14; fy < 212; fy += 18) px(0, fy, 320, 1, "#3c3156");

    // ---- 大きな窓（紺〜紫の星空・三日月・またたく星） ----
    px(90, 6, 142, 58, "#6d5fa8");                 // 窓枠
    px(93, 9, 136, 52, "#141a3f");                 // 夜空(上)
    px(93, 27, 136, 18, "#1e1d52");
    px(93, 45, 136, 16, "#2c2260");                // 夜空(下・紫)
    stars.forEach(function (st) {
      var tw = ((tick + st.ph * 2) % 7) < 2 ? 1 : 0.35;
      ctx.globalAlpha = tw;
      px(st.x, st.y, 1, 1, "#fff8d8");
      if (st.ph === 0 && tw === 1) { px(st.x - 1, st.y, 1, 1, "#8f8ec0"); px(st.x + 1, st.y, 1, 1, "#8f8ec0"); }
      ctx.globalAlpha = 1;
    });
    // 三日月（ミニピクセルマップで描画）
    (function () {
      var moon = ["...mmm..", "..mmm...", ".mmm....", ".mm.....", ".mm.....", ".mmm....", "..mmm...", "...mmm.."];
      for (var mj = 0; mj < moon.length; mj++)
        for (var mi = 0; mi < 8; mi++)
          if (moon[mj][mi] === "m") px(204 + mi, 13 + mj, 1, 1, "#ffe9a8");
    })();
    // 窓の桟
    px(160, 9, 2, 52, "#6d5fa8");
    px(93, 34, 136, 2, "#6d5fa8");

    // ---- 壁飾り（王冠・鍵・ハート・星のモチーフ） ----
    drawCrown(156, 0, "#e5c545");                   // 窓の上に王冠
    drawKey(46, 40, "#e5c545");                     // 左壁に鍵
    drawHeart(70, 44, "#d4586d", 1);                // 左壁にハート
    drawStarP(76, 30, "#e5c545", 1);
    drawStarP(240, 46, "#e5c545", 1);
    drawHeart(250, 36, "#d4586d", 1);
    // ガーランド（窓の下）
    for (var g = 96; g < 226; g += 14) {
      px(g, 64, 12, 1, "#6d5fa8");
      if ((g / 14 | 0) % 2 === 0) drawHeart(g + 4, 66, "#d4586d", 1);
      else drawStarP(g + 5, 66, "#e5c545", 1);
    }

    // ---- 壁掛け時計プレート（時刻はDOMで重ねる） ----
    px(252, 12, 44, 16, "#17123a");
    px(253, 13, 42, 14, "#0b0820");
    px(252, 12, 44, 1, "#6d5fa8"); px(252, 27, 44, 1, "#6d5fa8");
    px(252, 12, 1, 16, "#6d5fa8"); px(295, 12, 1, 16, "#6d5fa8");

    // ---- 本棚（左端） ----
    px(6, 26, 36, 62, "#5a4030");
    px(9, 30, 30, 12, "#2a1d14"); px(9, 46, 30, 12, "#2a1d14"); px(9, 62, 30, 12, "#2a1d14");
    var bookCols = ["#93353f", "#3b6fb5", "#4a8a4a", "#e5c545", "#d4586d", "#6d5fa8", "#c07840"];
    for (var shelf = 0; shelf < 3; shelf++) {
      for (var bk = 0; bk < 7; bk++) {
        var bh = 9 + ((bk * 3 + shelf) % 3);
        px(10 + bk * 4, 42 + shelf * 16 - bh, 3, bh, bookCols[(bk + shelf * 2) % 7]);
      }
    }
    px(6, 88, 36, 2, "#3a281c");

    // ---- コーヒーメーカー（右端の台の上） ----
    px(282, 66, 30, 22, "#4a3a58");                // 台
    px(284, 68, 26, 2, "#5c4a6e");
    px(288, 46, 18, 20, "#23252e");                // 本体
    px(290, 48, 14, 4, "#3b6fb5");                 // 表示部
    px(293, 56, 8, 7, "#e9e5da");                  // ポット
    px(294, 58, 6, 4, "#6b3a1d");                  // コーヒー
    if (tick % 6 < 3) { px(296, 42, 1, 3, "#8f8ec0"); px(298, 40, 1, 3, "#8f8ec0"); } // 湯気

    // ---- 観葉植物（右） ----
    px(266, 74, 12, 12, "#a3562f");                // 鉢
    px(267, 72, 10, 2, "#c0703f");
    px(268, 56, 3, 18, "#3f7a3f");
    px(263, 60, 6, 3, "#4a8a4a"); px(274, 58, 7, 3, "#4a8a4a");
    px(266, 52, 4, 4, "#5aa35a"); px(272, 50, 5, 4, "#5aa35a");
    px(261, 66, 5, 2, "#3f7a3f");
  }

  /* ============================================================
     デスクとキャラの描画
  ============================================================ */
  function drawDesk(m, tick, allGold) {
    var x = m.cx - 30, y = m.deskY;
    var done = m.st.state === "done" || allGold;
    var top   = done ? "#e2bd54" : "#7a5a3a";
    var topHi = done ? "#f6df8f" : "#93714c";
    var front = done ? "#b08d2e" : "#5c422a";
    var leg   = done ? "#8a6d1d" : "#43301f";

    px(x, y, 60, 4, top);
    px(x, y, 60, 1, topHi);
    px(x, y + 4, 60, 12, front);
    px(x + 2, y + 16, 3, 5, leg); px(x + 55, y + 16, 3, 5, leg);
    px(x + 34, y + 6, 22, 8, done ? "#8a6d1d" : "#4a3524");    // 引き出し
    px(x + 43, y + 9, 4, 1, done ? "#f6df8f" : "#93714c");

    // ノートPC（背面から・working時は画面光が縁からもれて明滅）
    var lx = m.cx - 8, ly = y - 8;
    if (m.st.state === "working") {
      var glow = tick % 2 === 0 ? "#9fd7ff" : "#4c7aa8";
      px(lx - 1, ly - 1, 18, 10, glow);
      ctx.globalAlpha = tick % 2 === 0 ? 0.5 : 0.25;
      px(lx - 3, ly - 3, 22, 13, glow);
      ctx.globalAlpha = 1;
    }
    px(lx, ly, 16, 9, "#23252e");
    px(lx + 1, ly + 1, 14, 7, "#31343f");
    px(lx + 6, ly + 3, 4, 3, "#4a4e5c");           // ロゴ
    px(lx - 1, ly + 9, 18, 1, "#1a1c22");

    // 書類
    px(x + 44, y - 3, 10, 3, "#e9e5da");
    px(x + 45, y - 4, 10, 3, "#f4f2ec");
    px(x + 47, y - 3, 6, 1, "#8f8ec0");

    // マグカップ
    px(x + 5, y - 4, 5, 4, "#d4586d");
    px(x + 10, y - 3, 1, 2, "#d4586d");
    if (m.st.state === "working" && tick % 4 < 2) px(x + 6, y - 7, 1, 2, "#8f8ec0");
  }

  function drawTypingHands(m, tick) {
    var hy = m.deskY - 2 - (tick % 2);
    px(m.cx - 7, hy, 3, 2, m.skin);
    px(m.cx + 5, hy + (tick % 2 === 0 ? 1 : 0) - 1, 3, 2, m.skin);
  }

  function drawBanzai(m, topY) {
    // 万歳の腕（肩から斜め上へ）
    var shY = topY + Math.floor(m.spr.map.length * 0.52);
    for (var i = 0; i < 6; i++) {
      px(m.cx - 9 - i, shY - i * 2, 2, 3, m.sleeve);
      px(m.cx + 8 + i, shY - i * 2, 2, 3, m.sleeve);
    }
    px(m.cx - 16, shY - 13, 3, 3, m.skin);
    px(m.cx + 14, shY - 13, 3, 3, m.skin);
  }

  function drawQuirk(m, topY, tick) {
    var fx = m.cx, fy = topY + 9; // 顔のあたり
    switch (m.quirk) {
      case "magnify": // ミナト: 虫眼鏡を覗き込む
        var mg = [".ggg..", "glllg.", "glLlg.", "glllg.", ".ggghh", ".....h"];
        var mgc = { g: "#d8b750", l: "#bcd9e8", L: "#eaf6fc", h: "#6b4a20" };
        for (var qj = 0; qj < mg.length; qj++)
          for (var qi = 0; qi < 6; qi++)
            if (mg[qj][qi] !== ".") px(fx + 8 + qi, fy - 1 + qj, 1, 1, mgc[mg[qj][qi]]);
        px(fx + 13, fy + 5, 3, 2, m.skin); // 柄をにぎる手
        break;
      case "pen": // ハル: ペン回し
        var ph = tick % 2;
        px(fx + 10, fy + 8, 3, 2, m.skin);
        if (ph === 0) { px(fx + 8, fy + 6, 7, 1, "#e5c545"); px(fx + 8, fy + 5, 1, 1, "#2b2118"); }
        else { px(fx + 9, fy + 3, 1, 5, "#e5c545"); px(fx + 9, fy + 2, 1, 1, "#2b2118"); }
        break;
      case "glasses": // アオイ: メガネをクイッ
        px(fx + 2, fy + 1, 3, 2, m.skin);
        px(fx - 6, fy - 1, 4, 1, "#ffffff"); // レンズの光
        px(fx + 2, fy - 1, 4, 1, "#ffffff");
        break;
      case "coffee": // リク: コーヒーを一口
        px(fx + 6, fy + 3, 5, 5, "#f4f2ec");
        px(fx + 11, fy + 4, 1, 3, "#f4f2ec");
        px(fx + 7, fy + 4, 3, 1, "#6b3a1d");
        px(fx + 5, fy + 8, 3, 2, m.skin);
        if (tick % 2 === 0) { px(fx + 7, fy - 1, 1, 2, "#c9c4e0"); px(fx + 9, fy - 2, 1, 2, "#c9c4e0"); }
        break;
      case "letter": // ユメ: 手紙を見つめる
        px(fx - 4, fy + 9, 9, 6, "#faf6ee");
        px(fx - 4, fy + 9, 9, 1, "#c9b8a0");
        px(fx - 4, fy + 9, 5, 3, "#e8ddc8"); px(fx, fy + 9, 5, 3, "#e8ddc8");
        drawHeart(fx - 1, fy + 11, "#d4586d", 1);
        px(fx - 6, fy + 12, 2, 3, m.skin); px(fx + 5, fy + 12, 2, 3, m.skin);
        break;
    }
  }

  function drawMember(m, idx, tick, allDone) {
    var mapH = m.spr.map.length;
    var bottomY = m.deskY + 6;
    var topY = bottomY - mapH;
    var st = m.st.state;
    var pal = m.palN;
    var oy = topY;
    var quirkOn = st === "working" && ((tick + idx * 3) % 14) < 3;

    if (st === "idle") {
      pal = m.palD;
      oy = topY + ((tick % 8) < 4 ? 0 : 1);          // ゆっくり呼吸
    } else if (st === "error") {
      pal = (tick % 2 === 0) ? m.palR : m.palE;      // 赤点滅
      oy = topY + 3;                                  // うなだれ
    } else if (st === "working" && m.quirk === "jump" && quirkOn) {
      oy = topY - 3;                                  // ツムギ: ぴょんと跳ねる
    }

    drawMap(m.spr.map, pal, m.cx - 16, oy);

    if (st === "working") {
      if (quirkOn && m.quirk !== "jump") drawQuirk(m, oy, tick);
      else drawTypingHands(m, tick);
    } else if (st === "done") {
      drawBanzai(m, oy);
    }

    drawDesk(m, tick, allDone);
  }

  /* ============================================================
     パーティクル（ハート・星）
  ============================================================ */
  var particles = [];
  function spawnHeart(x, y, col) {
    particles.push({ x: x, y: y, vy: -1.2 - Math.random(), life: 10 + (Math.random() * 5 | 0), max: 15, col: col, kind: "heart" });
  }
  function spawnStar(x, y) {
    particles.push({ x: x, y: y, vy: -0.6 - Math.random() * .8, life: 10 + (Math.random() * 6 | 0), max: 16, col: "#ffe9a8", kind: "star" });
  }
  function stepParticles() {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.y += p.vy; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }
  function drawParticles() {
    particles.forEach(function (p) {
      var a = Math.min(1, p.life / p.max + .25);
      if (p.kind === "heart") drawHeart(Math.round(p.x), Math.round(p.y), p.col, a);
      else drawStarP(Math.round(p.x), Math.round(p.y), p.col, a);
    });
  }

  /* ============================================================
     DOMオーバーレイ（時計・バッジ・名札・バナー）
  ============================================================ */
  var clockEl = document.getElementById("clock");
  clockEl.style.left = (254 * S) + "px";
  clockEl.style.top = (13 * S) + "px";
  function updClock() {
    var d = new Date();
    function z(v) { return (v < 10 ? "0" : "") + v; }
    clockEl.textContent = z(d.getHours()) + ":" + z(d.getMinutes());
  }
  updClock(); setInterval(updClock, 1000);

  var allDone = MEMBERS.every(function (m) { return m.st.state === "done"; });
  if (allDone) document.getElementById("banner").style.display = "block";

  MEMBERS.forEach(function (m) {
    var mapH = m.spr.map.length;
    var topY = m.deskY + 6 - mapH;

    // 状態バッジ
    var b = document.createElement("div");
    b.className = "badge";
    if (m.st.state === "idle")   { b.textContent = "💤"; b.classList.add("zzz"); }
    if (m.st.state === "done")   { b.textContent = "✅"; b.classList.add("check"); }
    if (m.st.state === "error")  { b.textContent = "⚠️"; b.classList.add("warn"); }
    b.style.left = ((m.cx + 13) * S) + "px";
    b.style.top = ((topY + 1) * S) + "px";
    if (b.textContent) stage.appendChild(b);

    // 名札（名前・役職絵文字・現在のtask）
    var p = document.createElement("div");
    p.className = "plate " + m.st.state;
    var stateLabel = { idle: "待機中…", working: "作業中", done: "完了！", error: "トラブル発生" };
    var task = m.st.task || stateLabel[m.st.state] || "";
    p.innerHTML = '<span class="nm">' + m.name + '</span><br><span class="tk">' +
      task.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") + '</span>';
    p.style.left = ((m.cx - 42) * S) + "px";
    p.style.top = ((m.deskY + 23) * S) + "px";
    stage.appendChild(p);
  });

  /* ============================================================
     メインループ（380msでコマ切り替え）
  ============================================================ */
  var tick = 0;
  function render() {
    ctx.clearRect(0, 0, 320, 212);
    drawRoom(tick);
    MEMBERS.forEach(function (m, i) { drawMember(m, i, tick, allDone); });

    // doneキャラの頭上からハートがふわっと
    MEMBERS.forEach(function (m, i) {
      if (m.st.state === "done" && (tick + i) % 3 === 0) {
        var topY = m.deskY + 6 - m.spr.map.length;
        spawnHeart(m.cx - 8 + (Math.random() * 16 | 0), topY - 2, ["#ff8fb0", "#d4586d", "#ffb3c8"][tick % 3]);
      }
    });
    // 全員完了: 画面全体にハートと星が舞う
    if (allDone && tick % 2 === 0) {
      spawnStar(Math.random() * 300 + 8, Math.random() * 100 + 100);
      spawnHeart(Math.random() * 300 + 8, Math.random() * 100 + 100, "#ff8fb0");
    }

    stepParticles();
    drawParticles();
    tick++;
  }
  render();
  setInterval(render, 380);
})();
</script>
</body>
</html>
