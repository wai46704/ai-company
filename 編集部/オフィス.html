<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🗝️ Nオフィス執務室</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% -10%, #241b4d 0%, #140f2e 55%, #0b081c 100%);
    font-family: "Meiryo", "Yu Gothic", "Hiragino Sans", sans-serif;
    color: #e8e4ff;
    overflow-x: hidden;
  }

  header { text-align: center; padding: 18px 8px 8px; }
  h1 {
    font-size: 28px;
    letter-spacing: 5px;
    color: #ffe9a8;
    text-shadow: 0 0 14px rgba(255, 214, 110, 0.5), 0 2px 0 #4a3300;
  }
  h1 .key { display: inline-block; animation: keyswing 4s ease-in-out infinite; }
  @keyframes keyswing {
    0%, 100% { transform: rotate(-10deg); }
    50%      { transform: rotate(10deg); }
  }
  #office-message { margin-top: 8px; font-size: 15px; color: #cfd0ff; }
  #office-updated { margin-top: 4px; font-size: 12px; color: #8d8bc2; }
  #office-warn { margin-top: 4px; font-size: 12px; color: #ff9d9d; display: none; }

  /* 全員完了バナー */
  #banner {
    display: none;
    margin: 10px auto 0;
    width: fit-content;
    padding: 8px 26px;
    border: 2px solid #ffd76a;
    border-radius: 10px;
    background: linear-gradient(180deg, #3a2c00, #211800);
    color: #ffe9a8;
    font-size: 18px;
    letter-spacing: 3px;
    box-shadow: 0 0 18px rgba(255, 214, 110, 0.45);
    animation: bannerpulse 1.4s ease-in-out infinite;
  }
  @keyframes bannerpulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 12px rgba(255,214,110,.35); }
    50%      { transform: scale(1.04); box-shadow: 0 0 26px rgba(255,214,110,.7); }
  }

  /* ステージ（ドット絵の部屋） */
  #fit { display: flex; justify-content: center; margin-top: 12px; }
  #stage {
    position: relative;
    width: 1360px;
    height: 952px;
    flex: 0 0 auto;
    transform-origin: top center;
  }
  #cv {
    width: 1360px;
    height: 952px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 4px solid #4a3f78;
    border-radius: 6px;
    box-shadow: 0 0 0 4px #17123a, 0 14px 40px rgba(0,0,0,.6);
    display: block;
  }

  /* 壁掛けデジタル時計（DOM・canvas上に重ねる） */
  #clock {
    position: absolute;
    width: 176px;
    text-align: center;
    font-family: "Consolas", "Courier New", monospace;
    font-size: 24px;
    line-height: 56px;
    letter-spacing: 4px;
    color: #7dffb0;
    text-shadow: 0 0 8px rgba(90, 255, 160, .8);
    pointer-events: none;
  }

  /* 状態バッジ */
  .badge { position: absolute; font-size: 26px; pointer-events: none; transition: opacity .3s; }

  /* 名札 */
  .plate {
    position: absolute;
    width: 336px;
    text-align: center;
    pointer-events: none;
  }
  .plate .nm {
    display: inline-block;
    padding: 3px 14px;
    background: linear-gradient(180deg, #524683, #37305e);
    border: 2px solid #6d5fa8;
    border-radius: 8px;
    font-size: 16px;
    color: #f2eeff;
    letter-spacing: 1px;
    box-shadow: 0 3px 0 #201a40;
  }
  .plate.done .nm { border-color: #ffd76a; background: linear-gradient(180deg, #6b5518, #43350c); color: #ffe9a8; }
  .plate.error .nm { border-color: #ff7a7a; background: linear-gradient(180deg, #6b2020, #401010); }
  .plate .tk {
    margin-top: 4px;
    font-size: 12px;
    color: #b9b4e6;
    background: rgba(15, 12, 38, .78);
    border-radius: 6px;
    padding: 2px 8px;
    display: inline-block;
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
</style>

<body>

<header>
  <h1><span class="key">🗝️</span> Nオフィス執務室</h1>

  <div id="office-warn">⚠️ 状態ファイルが見つかりません（idle表示中）</div>
  <div id="banner">👑 本日の業務完了！ 👑</div>
</header>

<div id="fit">

    <canvas id="cv" width="340" height="238"></canvas>
    <div id="clock">--:--</div>

  ------------------------------------------------------------ */
  var VALID_STATES = { idle: 1, working: 1, done: 1, error: 1 };

  function normalizeStatus(raw) {
    if (!raw || typeof raw !== "object" || !raw.members || typeof raw.members !== "object") {
      return { ok: false, updated: "-", message: "状態ファイルが見つかりません", members: {} };
    }
    var members = {};
    for (var id in raw.members) {
      var m = raw.members[id] || {};
      var st = (typeof m.state === "string" && VALID_STATES[m.state]) ? m.state : "idle";
      members[id] = { state: st, task: (typeof m.task === "string") ? m.task : "" };
    }
    return {
      ok: true,
      updated: raw.updated || "-",
      message: raw.message || "",
      members: members
    };
  }

  // 初期状態（同期読み込み済みの window.OFFICE_STATUS を使用）
  var STATUS = normalizeStatus(window.OFFICE_STATUS);
  if (!STATUS.ok) warnEl.style.display = "block";

  function memberState(id) {
    var m = STATUS.members && STATUS.members[id];
    return { state: (m && m.state) || "idle", task: (m && m.task) || "" };
  }

  function applyHeader() {

    function c(v) { v = Math.max(0, Math.min(255, Math.round(v))); return (v < 16 ? "0" : "") + v.toString(16); }
    return "#" + c(r) + c(g) + c(b);

  // まばたきフラグ blink=true のとき、eyeRows の 'e' を肌色 's' に置換して描く
  // hideArms を渡すと、その行範囲(rows)の中央(keep)以外の列を描かない
  //  → done(万歳)時に「下がった腕」を消して、上げた腕だけを見せるために使う。
  function drawMap(spr, pal, ox, oy, blink, hideArms) {
    var map = spr.map;
    var eyeSet = null;
    if (blink && spr.eyeRows) { eyeSet = {}; spr.eyeRows.forEach(function (r) { eyeSet[r] = 1; }); }
    for (var j = 0; j < map.length; j++) {
      var row = map[j];
      var closeThis = eyeSet && eyeSet[j];
      var armRow = hideArms && j >= hideArms.rows[0] && j <= hideArms.rows[1];
      for (var i = 0; i < row.length; i++) {
        var ch = row[i];
        if (ch === ".") continue;
        // done時: 腕の行では中央の胴体(keep)以外＝下がった腕の列を消す
        if (armRow && (i < hideArms.keep[0] || i > hideArms.keep[1])) continue;
        if (closeThis && ch === "e") ch = "s"; // 目を閉じる=肌で塗る
        var col = pal[ch];
        if (col) { ctx.fillStyle = col; ctx.fillRect(ox + i, oy + j, 1, 1); }
      }
    }
  }

  function drawDeskLightGlow(cx, y) {
    // デスクライトの黄色い光だまり（半透明の重ね）
    ctx.globalAlpha = 0.10;
    ctx.fillStyle = "#ffe9a8";
    for (var r = 14; r >= 4; r -= 3) {
      ctx.fillRect(cx - r, y - 5 - r / 3, r * 2, r);
    }
    ctx.globalAlpha = 1;
  }

  function drawDesk(m, tw, allGold) {
    var x = m.cx - 34, y = m.deskY;
    var done = m.st.state === "done" || allGold;
    var top   = done ? "#e2bd54" : "#7a5a3a";
    var topHi = done ? "#f6df8f" : "#93714c";
    var front = done ? "#b08d2e" : "#5c422a";
    var leg   = done ? "#8a6d1d" : "#43301f";

    // working時: デスクライトの光だまりを机上に敷く
    if (m.st.state === "working") drawDeskLightGlow(m.cx + 18, y);

    px(x, y, 68, 4, top);
    px(x, y, 68, 1, topHi);
    px(x, y + 4, 68, 13, front);
    px(x + 2, y + 17, 3, 6, leg); px(x + 63, y + 17, 3, 6, leg);
    px(x + 40, y + 6, 24, 9, done ? "#8a6d1d" : "#4a3524");    // 引き出し
    px(x + 50, y + 9, 4, 1, done ? "#f6df8f" : "#93714c");

    // デスクライト（右奥・アーム＋笠）— working時は点灯
    var lampOn = m.st.state === "working";
    var lampX = x + 60, lampY = y - 1;
    px(lampX, lampY - 2, 2, 3, "#3a3050");                // 支柱
    px(lampX - 4, lampY - 8, 8, 3, lampOn ? "#e5c545" : "#5a5070"); // 笠
    px(lampX - 3, lampY - 5, 6, 1, lampOn ? "#fff4c8" : "#3a3050"); // 電球

    // ノートPC（背面から・working時は画面光が縁からもれて明滅）
    var lx = m.cx - 9, ly = y - 9;
    if (m.st.state === "working") {
      var pulse = 0.5 + 0.5 * Math.sin(tw * 6 + m.cx);   // 連続明滅
      var gr = Math.round(76 + 100 * pulse), gg = Math.round(122 + 90 * pulse), gb = Math.round(168 + 70 * pulse);
      var glow = rgb2hex(gr, gg, gb);
      px(lx - 1, ly - 1, 20, 11, glow);
      ctx.globalAlpha = 0.25 + 0.25 * pulse;
      px(lx - 3, ly - 3, 24, 14, glow);
      ctx.globalAlpha = 1;
    }
    px(lx, ly, 18, 10, "#23252e");
    px(lx + 1, ly + 1, 16, 8, "#31343f");
    px(lx + 7, ly + 4, 4, 3, "#4a4e5c");           // ロゴ
    px(lx - 1, ly + 10, 20, 1, "#1a1c22");

    // 積み重ねた書類（左）＋付箋

    px(x + 4, y - 5, 12, 3, "#f4f2ec");
    px(x + 5, y - 7, 12, 3, "#e9e5da");
    px(x + 7, y - 6, 6, 1, "#8f8ec0");

    px(x + 15, y - 3, 3, 3, "#f0a8c6");            // 付箋（ピンク）

      ctx.globalAlpha = 1;

  // 各キャラ固有のクセ（working中に周期的に出現）
  function drawQuirk(m, topY, tw) {
    var fx = m.cx, fy = topY + 10;
    switch (m.quirk) {
      case "magnify": // ミナト: 虫眼鏡を覗き込む（軽く上下）
        var bob = Math.round(Math.sin(tw * 4) * 1);
        var mg = [".ggg..", "glllg.", "glLlg.", "glllg.", ".ggghh", ".....h"];
        var mgc = { g: "#d8b750", l: "#bcd9e8", L: "#eaf6fc", h: "#6b4a20" };
        for (var qj = 0; qj < mg.length; qj++)
          for (var qi = 0; qi < 6; qi++)
            if (mg[qj][qi] !== ".") px(fx + 10 + qi, fy - 1 + qj + bob, 1, 1, mgc[mg[qj][qi]]);
        px(fx + 15, fy + 5 + bob, 3, 2, m.skin);
        break;
      case "pen": // ハル: ペン回し（角度が連続的に回る）
        var ang = (tw * 6) % (Math.PI * 2);
        var px0 = fx + 12, py0 = fy + 8;
        px(px0, py0, 3, 2, m.skin);
        var dx = Math.round(Math.cos(ang) * 3), dy = Math.round(Math.sin(ang) * 3);
        px(px0 + 1 - dx, py0 - dy, 1, 1, "#2b2118");         // ペン先
        px(px0 + 1, py0, 1, 1, "#e5c545");
        px(px0 + 1 + dx, py0 + dy, 1, 1, "#e5c545");
        break;
      case "glasses": // アオイ: メガネをクイッ（光が横に流れる）
        px(fx + 3, fy + 1, 3, 2, m.skin);
        var gl = Math.round((Math.sin(tw * 3) + 1) * 3);
        px(fx - 7 + gl, fy - 2, 3, 1, "#ffffff");
        px(fx + 2 + gl, fy - 2, 3, 1, "#ffffff");
        break;
      case "coffee": // リク: コーヒーを一口（湯気ゆらゆら）
        px(fx + 7, fy + 3, 5, 5, "#f4f2ec");
        px(fx + 12, fy + 4, 1, 3, "#f4f2ec");
        px(fx + 8, fy + 4, 3, 1, "#6b3a1d");
        px(fx + 6, fy + 8, 3, 2, m.skin);
        var cw = Math.round(Math.sin(tw * 4) * 1);
        px(fx + 8 + cw, fy - 1, 1, 2, "#c9c4e0"); px(fx + 10 - cw, fy - 2, 1, 2, "#c9c4e0");
        break;
      case "letter": // ユメ: 手紙を見つめる（ハートふわ）
        px(fx - 5, fy + 9, 10, 6, "#faf6ee");
        px(fx - 5, fy + 9, 10, 1, "#c9b8a0");
        px(fx - 5, fy + 9, 5, 3, "#e8ddc8"); px(fx, fy + 9, 5, 3, "#e8ddc8");
        var hb = Math.round(Math.sin(tw * 3) * 1);
        drawHeart(fx - 1, fy + 10 + hb, "#d4586d", 1);
        px(fx - 7, fy + 12, 2, 3, m.skin); px(fx + 6, fy + 12, 2, 3, m.skin);
        break;
    }
  }

  /* ---- 1人分の描画 ---- */
  function drawMember(m, idx, tw, allDone) {
    var mapH = m.spr.map.length;
    var bottomY = m.deskY + 6;
    var topY = bottomY - mapH;
    var st = m.st.state;

    // 足元の影（キャラごとに固定の楕円）
    drawShadow(m.cx, bottomY + 1, m.spr.w * 0.6);

    // パレット選択
    var pal = m.palN;
    if (allDone) pal = m.palW;
    var oy = topY;

    // まばたき（連続時間から周期的に。個体差を idx で付ける）
    var blinkPhase = (tw * 1000 + idx * 900) % 3400;
    var blink = blinkPhase < 130;   // 約130ms 目を閉じる

    // 固有のクセを出す位相（working）
    var quirkCycle = (tw + idx * 0.9) % 4.2;
    var quirkOn = st === "working" && quirkCycle < 1.1;

    if (st === "idle") {
      pal = m.palD;
      // ゆっくり呼吸（sin波で0〜1px上下、連続）
      oy = topY + (Math.sin(tw * 1.6 + idx) > 0 ? 0 : 1);
      // たまに伸びをする（3コマ相当の上方向オフセット）
      var stretch = ((tw + idx * 1.3) % 9);
      if (stretch < 0.5) oy -= 2;
      else if (stretch < 1.0) oy -= 1;
    } else if (st === "error") {
      // 赤点滅（sin波でRとEを補間的に切替）＋うなだれ＋小刻み揺れ
      pal = (Math.sin(tw * 7) > 0) ? m.palR : m.palE;
      oy = topY + 3 + Math.round(Math.abs(Math.sin(tw * 5)) * 1);
    } else if (st === "working") {
      // 軽い前傾の上下（集中している呼吸）
      oy = topY + (Math.sin(tw * 3 + idx) > 0.3 ? 0 : 1);
      if (m.quirk === "jump" && quirkOn) {
        // ツムギ: ぴょんと跳ねる（放物線）
        var jp = quirkCycle / 1.1;                 // 0..1
        oy = topY - Math.round(Math.sin(jp * Math.PI) * 4);
      }
    } else if (st === "done") {
      // 喜びで軽く弾む
      oy = topY - Math.round(Math.abs(Math.sin(tw * 4 + idx)) * 2);
    }

    // done時のみ、doneArms を持つキャラ(ミナト/ハル)の下がった腕を消す。
    // 他4人は doneArms 未定義なので従来どおり全ピクセルを描画する。
    var hideArms = (st === "done") ? m.spr.doneArms : null;
    drawMap(m.spr, pal, m.cx - Math.floor(m.spr.w / 2), oy, blink, hideArms);

    if (st === "working") {
      if (quirkOn && m.quirk !== "jump") drawQuirk(m, oy, tw);
      else drawTypingHands(m, tw);
    } else if (st === "done") {
      drawBanzai(m, oy, tw);
    }

    drawDesk(m, tw, allDone);
  }

  /* ============================================================
     パーティクル（ハート・星）— 時間ベースで滑らかに上昇
  ============================================================ */
  var particles = [];
  function spawnHeart(x, y, col) {
    particles.push({ x: x, y: y, vy: -10 - Math.random() * 8, life: 1.4 + Math.random() * .6, max: 2.0, col: col, kind: "heart", sway: Math.random() * 6.28 });
  }
  function spawnStar(x, y) {
    particles.push({ x: x, y: y, vy: -7 - Math.random() * 6, life: 1.5 + Math.random() * .7, max: 2.2, col: "#ffe9a8", kind: "star", sway: Math.random() * 6.28 });
  }
  function stepParticles(dt, tw) {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.y += p.vy * dt;
      p.x += Math.sin(tw * 3 + p.sway) * 0.3;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }
  function drawParticles() {
    particles.forEach(function (p) {
      var a = Math.min(1, p.life / p.max + .25);
      if (p.kind === "heart") drawHeart(Math.round(p.x), Math.round(p.y), p.col, a);
      else drawStarP(Math.round(p.x), Math.round(p.y), p.col, a);
    });
  }

  /* ============================================================
     DOMオーバーレイ（時計・バッジ・名札・バナー）
  ============================================================ */
  var clockEl = document.getElementById("clock");
  clockEl.style.left = (270 * S) + "px";
  clockEl.style.top = (15 * S) + "px";
  function updClock() {
    var d = new Date();
    function z(v) { return (v < 10 ? "0" : "") + v; }
    clockEl.textContent = z(d.getHours()) + ":" + z(d.getMinutes());
  }
  updClock(); setInterval(updClock, 1000);

  var bannerEl = document.getElementById("banner");

  // バッジ・名札の DOM を作り、参照を保持して更新できるようにする
  var overlays = {};
  MEMBERS.forEach(function (m) {
    var mapH = m.spr.map.length;
    var topY = m.deskY + 6 - mapH;

    var b = document.createElement("div");
    b.className = "badge";
    b.style.left = ((m.cx + 15) * S) + "px";
    b.style.top = ((topY - 2) * S) + "px";
    stage.appendChild(b);

    var p = document.createElement("div");
    p.className = "plate";
    p.style.left = ((m.cx - 42) * S) + "px";
    p.style.top = ((m.deskY + 26) * S) + "px";
    stage.appendChild(p);

    overlays[m.id] = { badge: b, plate: p, topY: topY };
  });

  var stateLabel = { idle: "待機中…", working: "作業中", done: "完了！", error: "トラブル発生" };
  function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  var allDone = false;
  function refreshOverlays() {
    allDone = MEMBERS.every(function (m) { return m.st.state === "done"; });
    bannerEl.style.display = allDone ? "block" : "none";

    MEMBERS.forEach(function (m) {
      var ov = overlays[m.id];
      var st = m.st.state;
      // バッジ
      var bt = "";
      if (st === "idle") bt = "💤";
      else if (st === "done") bt = "✅";
      else if (st === "error") bt = "⚠️";
      ov.badge.textContent = bt;
      // 名札
      ov.plate.className = "plate " + st;
      var task = m.st.task || stateLabel[st] || "";
      ov.plate.innerHTML = '<span class="nm">' + esc(m.name) + '</span><br><span class="tk">' + esc(task) + '</span>';
    });
  }
  refreshOverlays();

  /* ============================================================
     状態ファイルの定期再取得（2秒ごと）
       - fetch は file:// で CORS 失敗しうる → try/catch でフォールバック。
       - 失敗しても既存 window.OFFICE_STATUS を使い続け、アニメは止めない。
       - 成功時は "window.OFFICE_STATUS = {...};" の中身を安全にパース。
  ============================================================ */
  function parseStatusText(text) {
    // "window.OFFICE_STATUS = { ... };" からオブジェクトリテラル部分を取り出し、
    // Function で評価（外部通信なし・ローカルの自ファイルのみ対象）。
    var idx = text.indexOf("=");
    if (idx < 0) throw new Error("format");
    var body = text.slice(idx + 1).trim();
    if (body.charAt(body.length - 1) === ";") body = body.slice(0, -1);
    // eslint-disable-next-line no-new-func
    var obj = (new Function("return (" + body + ");"))();
    return obj;
  }

  function refetchStatus() {
    // fetch 非対応・file:// 失敗などを全部握りつぶし、既存値を維持する
    if (typeof fetch !== "function") return;
    try {
      fetch("オフィス状態.js?t=" + Date.now(), { cache: "no-store" })
        .then(function (res) {
          if (!res.ok) throw new Error("http " + res.status);
          return res.text();
        })
        .then(function (text) {
          var raw = parseStatusText(text);
          var next = normalizeStatus(raw);
          if (!next.ok) return; // 不正なら維持
          STATUS = next;
          window.OFFICE_STATUS = raw;
          rebuildPalettes();     // m.st を更新
          applyHeader();
          refreshOverlays();
        })
        .catch(function () {
          // file:// CORS 失敗など → 既存の window.OFFICE_STATUS を使い続ける（何もしない）
        });
    } catch (e) {
      // 同期例外も握りつぶす（アニメ継続を最優先）
    }
  }
  setInterval(refetchStatus, 2000);

  /* ============================================================
     メインループ（requestAnimationFrame・時間ベース）
       - リロードなし。位相は経過秒 tw で計算し、常に滑らか。
  ============================================================ */
  var startT = null;
  var lastT = null;
  var heartAcc = 0, festAcc = 0;

  function frame(now) {
    if (startT === null) { startT = now; lastT = now; }
    var t = now - startT;          // 経過ms
    var tw = t / 1000;             // 経過秒
    var dt = Math.min(0.05, (now - lastT) / 1000); // フレーム時間（上限で暴走防止）
    lastT = now;

    ctx.clearRect(0, 0, CW, CH);
    drawRoom(t, tw);
    MEMBERS.forEach(function (m, i) { drawMember(m, i, tw, allDone); });

    // doneキャラの頭上からハートがふわっと（時間ベースで一定間隔）
    heartAcc += dt;
    if (heartAcc > 0.35) {
      heartAcc = 0;
      MEMBERS.forEach(function (m) {
        if (m.st.state === "done") {
          var topY = m.deskY + 6 - m.spr.map.length;
          spawnHeart(m.cx - 8 + (Math.random() * 16 | 0), topY - 2,
                     ["#ff8fb0", "#d4586d", "#ffb3c8"][(Math.random() * 3) | 0]);
        }
      });
    }
    // 全員完了: 画面全体にハートと星が舞う
    if (allDone) {
      festAcc += dt;
      if (festAcc > 0.12) {
        festAcc = 0;
        spawnStar(Math.random() * 320 + 8, Math.random() * 110 + 110);
        spawnHeart(Math.random() * 320 + 8, Math.random() * 110 + 110, "#ff8fb0");
      }
    }

    stepParticles(dt, tw);
    drawParticles();

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

})();
</script>
</body>
</html>
